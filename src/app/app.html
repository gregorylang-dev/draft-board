<div class="min-h-screen flex flex-col">
  <!-- Navigation Rail / Top Bar -->
  <nav class="bg-zinc-950 border-b border-zinc-800 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-8">
      <div class="flex items-center gap-2">
        <mat-icon class="text-emerald-400">sports_football</mat-icon>
        <span class="font-serif font-bold text-xl tracking-tight text-white">DraftMaster</span>
      </div>
      
      <div class="flex items-center gap-1">
        <a routerLink="/" routerLinkActive="bg-zinc-900 text-emerald-400" [routerLinkActiveOptions]="{exact: true}" class="px-4 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white transition-all flex items-center gap-2">
          <mat-icon class="text-lg">edit_calendar</mat-icon>
          Draft Room
        </a>
        <a routerLink="/grid" routerLinkActive="bg-zinc-900 text-emerald-400" class="px-4 py-2 rounded-lg text-sm font-medium text-zinc-400 hover:text-white transition-all flex items-center gap-2">
          <mat-icon class="text-lg">grid_view</mat-icon>
          Big Board
        </a>
      </div>
    </div>

    <div class="hidden md:flex items-center gap-6">
      <button (click)="onReset()" class="text-xs font-mono text-red-400/60 hover:text-red-400 uppercase tracking-widest transition-colors flex items-center gap-2">
        <mat-icon class="text-sm">refresh</mat-icon>
        Reset Draft
      </button>
      <div class="h-4 w-px bg-zinc-800"></div>
      <div class="flex items-center gap-4 text-xs font-mono text-zinc-500 uppercase tracking-widest">
        Live Draft Session
        <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
      </div>
    </div>
  </nav>

  <!-- Main Content Area -->
  <div class="flex-1 bg-zinc-950">
    <router-outlet></router-outlet>
  </div>
</div>
